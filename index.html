<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="mainContainer">
            <div class="registerCard">
                <h2 class="registerHeading">Cadastro de usuário</h2>
                <form>
                    <label for="username">
                        Insira o nome de usuário
                        <input id="username" type="text" maxlength="16" placeholder="(máx 16 caracteres)" required>
                    </label>
                    <label for="email">
                        Insira o seu E-mail
                        <input id="email" type="text" required>
                    </label>
                    <button id="send">Cadastrar</button>
                </form>
            </div>
            <div class="listingCard">
                <h2 class="listingHeader">Lista de usuários cadastrados</h2>
                <ul id="userList">
                </ul>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer>
        <h4>&copy; 2026 Matheus Oliveira - Todos os direitos reservados</h4>
    </footer>
</body>
</html>
